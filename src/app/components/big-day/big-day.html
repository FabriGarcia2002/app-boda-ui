<section class="py-24 px-6 bg-[#f3efe6] text-center">

    <div class="max-w-5xl mx-auto space-y-12">

        <!-- Encabezado -->
        <div class="space-y-4">
            <p class="tracking-[0.3em] text-xs text-muted-foreground uppercase">
                Cuenta regresiva
            </p>

            <h2 class="font-heading text-3xl md:text-5xl text-foreground">
                El gran día se acerca
            </h2>

            <div class="w-16 h-px bg-accent mx-auto"></div>
        </div>

        <!-- Contador -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-8">

            <div class="bg-white/60 backdrop-blur-sm rounded-xl shadow-sm py-8 space-y-2">
                <p id="days" class="font-heading text-4xl md:text-5xl">{{ days }}</p>
                <p class="text-xs tracking-[0.3em] text-muted-foreground uppercase">Días</p>
            </div>

            <div class="bg-white/60 backdrop-blur-sm rounded-xl shadow-sm py-8 space-y-2">
                <p id="hours" class="font-heading text-4xl md:text-5xl">{{ hours }}</p>
                <p class="text-xs tracking-[0.3em] text-muted-foreground uppercase">Horas</p>
            </div>

            <div class="bg-white/60 backdrop-blur-sm rounded-xl shadow-sm py-8 space-y-2">
                <p id="minutes" class="font-heading text-4xl md:text-5xl">{{ minutes }}</p>
                <p class="text-xs tracking-[0.3em] text-muted-foreground uppercase">Minutos</p>
            </div>

            <div class="bg-white/60 backdrop-blur-sm rounded-xl shadow-sm py-8 space-y-2">
                <p id="seconds" class="font-heading text-4xl md:text-5xl">{{ seconds }}</p>
                <p class="text-xs tracking-[0.3em] text-muted-foreground uppercase">Segundos</p>
            </div>

        </div>

        <!-- Decoración corazón -->
        <div class="flex items-center justify-center gap-4 pt-4">
            <div class="h-px w-16 bg-linear-to-r from-transparent to-accent"></div>

            <svg class="w-4 h-4 text-accent" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 
        2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
        C13.09 3.81 14.76 3 16.5 3
        19.58 3 22 5.42 22 8.5
        c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
            </svg>

            <div class="h-px w-16 bg-linear-to-l from-transparent to-accent"></div>
        </div>

        <!-- Frase -->
        <div class="space-y-4">
            <p class="italic text-muted-foreground max-w-xl mx-auto">
                "A veces el paraíso no es un lugar, es una persona"
            </p>
            <p class="text-sm text-muted-foreground">— Sara Búho</p>
        </div>

    </div>
</section>
