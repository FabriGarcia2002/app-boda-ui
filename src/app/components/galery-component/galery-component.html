<div class="flex flex-col min-h-screen">

  <app-wedding-nav></app-wedding-nav>

  <section class="min-h-screen bg-[#f3efe6] px-6 py-20">

    <!-- Encabezado -->
    <div class="text-center mb-12">
      <h2 class="font-heading text-4xl text-foreground mb-4">
        Galería de Fotos y Videos
      </h2>

      <p class="font-body text-muted-foreground max-w-xl mx-auto">
        Mira todos los momentos especiales que compartieron tus invitados
      </p>

      <div class="mt-6 flex justify-center">
        <div class="w-12 h-0.5 bg-accent rounded-full"></div>
      </div>
    </div>

    <!-- LOADING -->
    <div *ngIf="loading" class="flex justify-center items-center py-20">
      <div class="flex flex-col items-center gap-4">

        <!-- Spinner -->
        <div class="w-12 h-12 border-4 border-accent/30 border-t-accent rounded-full animate-spin"></div>

        <p class="font-body text-muted-foreground">
          Cargando recuerdos...
        </p>

      </div>
    </div>

    <!-- SIN FOTOS -->
    <div *ngIf="!loading && photos.length === 0" class="text-center py-20">
      <p class="font-body text-muted-foreground">
        Aún no hay fotos disponibles 📸
      </p>
    </div>

    <!-- GRID DE FOTOS -->
    <div
      *ngIf="!loading && photos.length > 0"
      class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
    >
      <div
        *ngFor="let photo of photos"
        class="relative overflow-hidden rounded-xl shadow-lg hover:scale-105 transition-transform duration-300 cursor-pointer"
        (click)="openModal(photo.url)"
      >
        <!-- Imagen -->
        <img
          *ngIf="!isVideo(photo.url)"
          [src]="photo.url"
          [alt]="photo.alt || 'Foto de boda'"
          class="w-full h-60 object-cover"
        />

        <!-- Video -->
        <video
          *ngIf="isVideo(photo.url)"
          [src]="photo.url"
          class="w-full h-60 object-cover"
          muted
        ></video>

        <!-- Mensaje opcional -->
        <div
          *ngIf="photo.message"
          class="absolute bottom-0 left-0 w-full bg-black/50 text-white p-2 text-sm font-body"
        >
          {{ photo.message }}
        </div>
      </div>
    </div>

  </section>

  <!-- MODAL -->
  <div
    *ngIf="showModal && currentMedia"
    class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4"
    (click)="closeModal()"
  >
    <div
      class="relative max-w-4xl max-h-[90vh] flex items-center justify-center"
      (click)="$event.stopPropagation()"
    >
      <button
        class="absolute top-2 right-2 text-white text-2xl"
        (click)="closeModal()"
      >
        ✕
      </button>

      <!-- Imagen modal -->
      <img
        *ngIf="currentMedia.type === 'image'"
        [src]="currentMedia.url"
        class="max-w-full max-h-[90vh] object-contain rounded-xl shadow-lg"
      />

      <!-- Video modal -->
      <video
        *ngIf="currentMedia.type === 'video'"
        [src]="currentMedia.url"
        controls
        autoplay
        class="max-w-full max-h-[90vh] object-contain rounded-xl shadow-lg"
      ></video>
    </div>
  </div>

</div>
